<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Upload</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

.drop{
border:2px dashed #38bdf8;
padding:30px;
border-radius:10px;
margin-bottom:20px;
cursor:pointer;
display:block;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.file{
margin-top:10px;
display:flex;
justify-content:space-between;
background:#334155;
padding:8px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Upload File</h2>

<label for="fileInput" class="drop" id="drop">
Drop file here or click
</label>

<input type="file" id="fileInput" multiple style="display:none;">

<div id="fileList"></div>

<button id="uploadBtn">Upload</button>

<button onclick="window.location='dashboard.html'">
Back to Dashboard
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="upload.js"></script>

</body>
</html>
