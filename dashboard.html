<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
font-family:Arial;
margin:40px;
background:#0f172a;
color:white;
}

.topbar{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.search{
margin-bottom:20px;
padding:10px;
width:300px;
border-radius:5px;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
max-width:100%;
height:120px;
object-fit:cover;
border-radius:5px;
}

.actions{
margin-top:10px;
display:flex;
flex-direction:column;
gap:6px;
}

</style>

</head>

<body>

<h2>Welcome, <span id="name"></span></h2>

<div class="topbar">

<button onclick="goUpload()">Upload File</button>
<button onclick="logout()">Logout</button>

</div>

<input
class="search"
type="text"
id="search"
placeholder="Search files..."
onkeyup="filterFiles()"
/>

<h3>Your Files</h3>

<div id="filesGrid" class="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="dashboard.js"></script>

</body>
</html>
