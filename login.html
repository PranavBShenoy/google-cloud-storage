<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud Storage Login</title>

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.card{
background:#1e293b;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
background:#22c55e;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#msg{
margin-top:10px;
color:#f87171;
}

</style>

</head>

<body>

<div class="card">

<h2>Signup</h2>

<input type="text" id="signup_name" placeholder="Name">
<input type="email" id="signup_email" placeholder="Email">
<input type="password" id="signup_pass" placeholder="Password">

<button onclick="signup()">Signup</button>

<hr>

<h2>Login</h2>

<input type="email" id="login_email" placeholder="Email">
<input type="password" id="login_pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

</body>
</html>
